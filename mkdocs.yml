---
site_name: urllib_gui
site_url: https://urllib_gui.readthedocs.io/
site_author: Matthew Martin <matthewdeanmartin@gmail.com>
site_description: A small Tkinter desktop client for urllib with text rendering, request editing, and export tools.
repo_url: https://github.com/matthewdeanmartin/urllib_gui
theme:
  name: readthedocs
  features: [navigation.footer]
edit_uri: edit/main/docs/
markdown_extensions:
  - attr_list
  - codehilite
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Installation: installation.md
  - Usage:
      - Quick Start: usage/quickstart.md
      - Request Workflows: usage/request-workflows.md
  - Contributing: extending/CONTRIBUTING.md
  - Changelog: changelog.md
validation:
  nav:
    omitted_files: warn
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
